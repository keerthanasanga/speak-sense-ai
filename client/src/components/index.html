<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>cinnamon · styled profile + girl avatar</title>
    <!-- Font Awesome 6 (free) for extra icons & polish -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        /* --- your original code — preserved, extended --- */
        :root {
            font-family: system-ui, Avenir, Helvetica, Arial, sans-serif;
            line-height: 1.5;
            font-weight: 400;

            color-scheme: light dark;
            color: rgba(255, 255, 255, 0.87);
            background-color: #242424;

            font-synthesis: none;
            text-rendering: optimizeLegibility;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        a {
            font-weight: 500;
            color: #646cff;
            text-decoration: inherit;
        }
        a:hover {
            color: #535bf2;
        }

        body {
            margin: 0;
            display: flex;
            place-items: center;
            min-width: 320px;
            min-height: 100vh;
            transition: background-color 0.3s, color 0.2s;
        }

        h1 {
            font-size: 3.2em;
            line-height: 1.1;
        }

        button {
            border-radius: 8px;
            border: 1px solid transparent;
            padding: 0.6em 1.2em;
            font-size: 1em;
            font-weight: 500;
            font-family: inherit;
            background-color: #1a1a1a;
            cursor: pointer;
            transition: border-color 0.25s, background 0.2s, box-shadow 0.2s;
        }
        button:hover {
            border-color: #646cff;
        }
        button:focus,
        button:focus-visible {
            outline: 4px auto -webkit-focus-ring-color;
        }

        @media (prefers-color-scheme: light) {
            :root {
                color: #213547;
                background-color: #ffffff;
            }
            a:hover {
                color: #747bff;
            }
            button {
                background-color: #f9f9f9;
            }
        }

        /* --- duplicate block removed (kept only once) --- */
        /* ---  ✦  new styling + girl avatar ✦  --- */

        /* center container — soft card with depth */
        .profile-card {
            max-width: 720px;
            width: 90%;
            margin: 2rem auto;
            padding: 2.5rem 2rem;
            background: color-mix(in srgb, currentColor 3%, transparent);
            background: light-dark(rgba(245, 245, 250, 0.75), rgba(20, 20, 30, 0.7));
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px;
            box-shadow: 0 25px 45px -10px rgba(0, 0, 0, 0.25),
                        0 0 0 1px rgba(255, 255, 255, 0.08) inset;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.25s ease, box-shadow 0.3s;
        }

        .profile-card:hover {
            transform: scale(1.01);
            box-shadow: 0 30px 55px -8px rgba(100, 108, 255, 0.25);
        }

        /* avatar section — human girl image + floating badge */
        .avatar-frame {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 2rem;
        }

        .avatar-img {
            width: 140px;
            height: 140px;
            border-radius: 50%;
            object-fit: cover;
            border: 4px solid #646cff;
            box-shadow: 0 15px 25px -8px #1e1e3f;
            transition: 0.2s;
            background: #c7b9ff; /* fallback pastel */
        }

        /* actual "girl human avatar" image (illustrative, cute style) */
        .avatar-img {
            /* High-quality avatar from a cool open source illustration library */
            content: url("https://api.dicebear.com/9.x/adventurer/svg?seed=Jasmine&size=240&flip=true&backgroundColor=b6e3f4&hair=longCurly,shortWaved&hairColor=2c1b0e,d2691e&skinColor=f8d5c2&clothing=shirt&clothingColor=ffdfbf&glasses=square&accessories=eyepatch");            
            display: block;
            background: #ffe6f0; /* soft warm background while loading */
        }

        /* optional micro-label — girl / human */
        .badge-human {
            margin-top: 12px;
            background: #646cff20;
            backdrop-filter: blur(5px);
            padding: 0.3rem 1.2rem;
            border-radius: 40px;
            font-size: 0.85rem;
            font-weight: 400;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            border: 1px solid #646cff40;
            color: light-dark(#2b2b4f, #dad8ff);
        }

        .badge-human i {
            color: #ff88b0;
            font-size: 1rem;
        }

        /* name & bio */
        .profile-info {
            text-align: center;
        }

        .profile-info h1 {
            font-size: 2.8rem;
            margin: 0.2rem 0 0.25rem;
            background: linear-gradient(145deg, #b2abff, #ffb8d1);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.02em;
            font-weight: 700;
        }

        .handle {
            font-size: 1.2rem;
            color: #888cff;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        .handle i {
            font-size: 1rem;
            color: #ff98b9;
        }

        .bio {
            font-size: 1.15rem;
            max-width: 480px;
            margin: 1.2rem auto 1.8rem;
            opacity: 0.85;
            font-weight: 350;
            line-height: 1.6;
        }

        /* stats row (extra style) */
        .stats {
            display: flex;
            justify-content: center;
            gap: 2.2rem;
            margin: 2rem 0 1.5rem;
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-number {
            font-size: 1.8rem;
            font-weight: 700;
            color: #9b9eff;
            line-height: 1.2;
        }

        .stat-label {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            opacity: 0.6;
        }

        /* social / action row */
        .actions {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            gap: 1rem;
            margin: 2rem 0 0.5rem;
        }

        .btn-primary, .btn-outline {
            border-radius: 60px;
            padding: 0.8rem 2rem;
            font-weight: 550;
            font-size: 1rem;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: 0.15s;
            border: 1px solid transparent;
        }

        .btn-primary {
            background: #646cff;
            color: #fff;
            box-shadow: 0 8px 20px -6px #3d44b0;
        }
        .btn-primary:hover {
            background: #7b82ff;
            border-color: #aab0ff;
            transform: translateY(-2px);
        }

        .btn-outline {
            background: transparent;
            border: 1.5px solid #646cff;
            color: inherit;
        }
        .btn-outline:hover {
            background: #646cff10;
            border-color: #a0a6ff;
        }

        /* follow hint (cute) */
        .friend-hint {
            margin-top: 1.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            font-size: 0.95rem;
            color: light-dark(#333, #ccc);
            border-top: 1px dashed #646cff40;
            padding-top: 1.2rem;
        }

        .friend-hint i {
            color: #f5a3c7;
        }

        /* extra touches for light/dark */
        @media (prefers-color-scheme: light) {
            .profile-card {
                background: rgba(250, 250, 255, 0.8);
                border: 1px solid rgba(0, 0, 0, 0.05);
            }
            .badge-human {
                background: #dad0ff60;
                border-color: #b1acff;
            }
        }
    </style>
</head>
<body>
    <!-- main card with girl avatar & extended styling -->
    <div class="profile-card">
        <!-- avatar block (girl human image) -->
        <div class="avatar-frame">
            <!-- The avatar-img src is set via CSS content (preserves vector, cute girl) 
                 we also add a fallback using the ::after technique? but dicebear works perfectly -->
            <div class="avatar-img" role="img" aria-label="Girl human avatar, cute cartoon style"></div>
            <!-- badge confirms human / girl -->
            <span class="badge-human"><i class="fas fa-female"></i> girl · human · 24 <i class="fas fa-ribbon"></i></span>
        </div>

        <!-- name and details -->
        <div class="profile-info">
            <h1>Luna Marigold</h1>
            <div class="handle">
                <i class="fas fa-at"></i> @luna_aurora
                <i class="fas fa-verified" style="color:#6b9eff;"></i>
            </div>
            <p class="bio">
                <i class="fas fa-sparkles" style="margin-right: 6px;"></i> 
                digital artist & stargazer · she/her · 
                <i class="fas fa-meteor"></i> creating soft dreams
            </p>
        </div>

        <!-- extra stats (just for style) -->
        <div class="stats">
            <div class="stat-item">
                <span class="stat-number">842</span>
                <span class="stat-label">posts</span>
            </div>
            <div class="stat-item">
                <span class="stat-number">12.4K</span>
                <span class="stat-label">followers</span>
            </div>
            <div class="stat-item">
                <span class="stat-number">631</span>
                <span class="stat-label">following</span>
            </div>
        </div>

        <!-- action buttons (more interactive styling) -->
        <div class="actions">
            <button class="btn-primary"><i class="far fa-comment"></i> Message</button>
            <button class="btn-outline"><i class="far fa-heart"></i> Support</button>
            <button class="btn-outline"><i class="fas fa-user-plus"></i> Follow</button>
        </div>

        <!-- extra cute girl-like hint -->
        <div class="friend-hint">
            <i class="fas fa-crown" style="opacity:0.7;"></i>
            <span>✨ she usually draws with pastels and 🧸 plushies nearby ✨</span>
            <i class="fas fa-crown" style="opacity:0.7;"></i>
        </div>

        <!-- small footnote: avatar credit inline (just for showcase) -->
        <div style="margin-top: 20px; font-size: 0.7rem; opacity: 0.4; text-align: center;">
            ⚡ avatar: adventurer by DiceBear (girl, human, cute) ⚡
        </div>
    </div>

    <!-- subtle note: your original code's body centering is untouched, we just added content -->
</body>
</html>
