<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SpeakSense Avatar System</title>
    <link rel="stylesheet" href="./styles.css" />
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.164.1/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.164.1/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <main class="app-shell">
      <header class="panel top-panel">
        <h1>3D Interviewer Avatar System</h1>
        <p>Professional multi-avatar stage for SpeakSense-AI</p>
      </header>

      <section class="panel controls-panel" aria-label="Avatar controls">
        <label for="roleSelect">Interviewer Type</label>
        <select id="roleSelect">
          <option value="hr">HR Interviewer</option>
          <option value="technical">Technical Interviewer</option>
          <option value="system-design">System Design Interviewer</option>
          <option value="behavioral">Behavioral Interviewer</option>
        </select>

        <div class="emotion-group" role="group" aria-label="Emotion controls">
          <button type="button" data-emotion="neutral">Neutral</button>
          <button type="button" data-emotion="friendly">Friendly</button>
          <button type="button" data-emotion="strict">Strict</button>
          <button type="button" data-emotion="impressed">Impressed</button>
        </div>

        <button id="speakBtn" type="button" class="accent">Test Speech</button>
      </section>

      <section class="panel stage-panel">
        <div id="avatarStage" aria-label="3D Avatar Stage"></div>
      </section>
    </main>

    <script>
      (function enableEmbedMode() {
        const params = new URLSearchParams(window.location.search);
        if (params.get("embed") === "1") {
          document.body.classList.add("embed-mode");
        }
      })();
    </script>
    <script type="module">
      import("./js/main.js").catch(function(err) {
        console.warn("[AvatarSystem] 3D module failed to load (CDN unavailable?):", err);
        const stage = document.getElementById("avatarStage");
        if (stage) {
          stage.innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#94a3b8;gap:1rem;"><div style="font-size:5rem;">🤖</div><div style="font-size:1rem;opacity:0.7">Avatar loading offline…</div></div>';
        }
      });
    </script>
  </body>
  </html>
